<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>v1.0 Team Manager Portal</title>
<meta name="viewport" content="width=1440, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Noto+Sans+Lao:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F4EFE5;--bg-deep:#ECE4D2;--paper:#FBF8F1;--surface:#fff;
    --ink:#14182A;--ink-2:#2A2F45;--muted:#6B6E7B;--muted-2:#8B8E99;
    --hairline:#E5DECC;--hairline-strong:#D8CFB8;
    --primary:#1A2A57;--primary-soft:#E5E8F2;
    --accent:#C4843A;--accent-soft:#F4E7CE;
    --positive:#2E6F47;--positive-soft:#DDEAD8;
    --warning:#B5832B;--warning-soft:#F6E9C8;
    --danger:#A8392E;--danger-soft:#F2D7CD;
    --font-ui:"Instrument Sans",ui-sans-serif,system-ui,sans-serif;
    --font-display:"Instrument Serif",serif;
    --font-mono:"JetBrains Mono",ui-monospace,monospace;
    --font-lao:"Noto Sans Lao","Instrument Sans",sans-serif;
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:var(--font-ui);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .lao{font-family:var(--font-lao)}.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
  .serif{font-family:var(--font-display);font-style:italic}.muted{color:var(--muted)}.small{font-size:11.5px}
  .shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh}
  .main{display:flex;flex-direction:column;min-width:0}
  .sidebar{background:#14182A;color:#E8E5DC;padding:18px 14px;display:flex;flex-direction:column;gap:14px;position:sticky;top:0;height:100vh;border-right:1px solid rgba(255,255,255,.06)}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 0}
  .brand-mark{width:36px;height:36px;border-radius:9px;background:#2E6F47;color:#fff;display:grid;place-items:center;font-family:var(--font-display);font-style:italic;font-size:22px;font-weight:600}
  .brand-t{font-size:14px;font-weight:600;color:#fff;line-height:1.1}
  .brand-s{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;letter-spacing:.06em}
  .me-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;display:flex;gap:10px;align-items:center}
  .me-av{width:38px;height:38px;border-radius:50%;background:#DDEAD8;color:#14523B;display:grid;place-items:center;font-weight:600;font-size:14px;flex:0 0 38px}
  .me-nm{color:#fff;font-weight:600;font-size:13.5px;line-height:1.2}
  .me-rl{font-size:11.5px;color:rgba(255,255,255,.6);margin-top:2px}
  .me-tag{font-size:10.5px;color:rgba(255,255,255,.45);margin-top:4px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
  .nav{display:flex;flex-direction:column;gap:1px;flex:1;overflow:auto;padding:4px 0}
  .nv{background:transparent;border:0;color:rgba(255,255,255,.72);text-align:left;font-size:13.5px;display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;position:relative;font-family:inherit}
  .nv:hover{background:rgba(255,255,255,.05);color:#fff}
  .nv.on{background:rgba(46,111,71,.16);color:#fff}
  .nv.on::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;background:#2E6F47;border-radius:0 3px 3px 0}
  .nv .badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10.5px;font-weight:600;padding:1px 6px;border-radius:999px;min-width:18px;text-align:center}
  .nv .badge.warn{background:var(--warning)}
  .topbar{height:60px;padding:0 28px;border-bottom:1px solid var(--hairline);background:rgba(244,239,229,.85);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .search{width:360px;background:#fff;border:1px solid var(--hairline);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13.5px;cursor:pointer}
  .search kbd{margin-left:auto;background:var(--bg-deep);border:1px solid var(--hairline);border-radius:5px;padding:1px 6px;font-size:11px;font-family:var(--font-mono)}
  .topbar-r{display:flex;align-items:center;gap:12px}
  .lang{display:inline-flex;background:#fff;border:1px solid var(--hairline);border-radius:999px;padding:2px}
  .lang button{background:transparent;border:0;cursor:pointer;font-size:12px;padding:4px 12px;border-radius:999px;color:var(--muted);font-weight:500;font-family:inherit}
  .lang button.on{background:var(--ink);color:#fff}.lang .lao{font-family:var(--font-lao)}
  .ic-btn{background:#fff;border:1px solid var(--hairline);width:36px;height:36px;border-radius:50%;display:grid;place-items:center;cursor:pointer;position:relative}
  .ic-btn .dot{position:absolute;top:7px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:2px solid #fff}
  .me-pill{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--hairline);padding:4px 12px 4px 4px;border-radius:999px;cursor:pointer}
  .me-pill .av{width:28px;height:28px;border-radius:50%;background:var(--positive-soft);color:var(--positive);display:grid;place-items:center;font-weight:600;font-size:12px}
  .me-pill .nm{font-size:12.5px;font-weight:600;line-height:1.1}
  .me-pill .rl{font-size:10.5px;color:var(--muted)}
  .content{padding:24px 32px 80px;max-width:1480px;margin:0 auto;width:100%}
  .page{display:flex;flex-direction:column;gap:22px}
  .page-h{display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .page-t{font-family:var(--font-display);font-style:italic;font-size:44px;line-height:1.05;letter-spacing:-.012em;margin:4px 0 6px}
  .page-s{color:var(--muted);max-width:720px;font-size:13.5px}
  .page-r{display:flex;gap:8px}
  /* Hero band — green for manager */
  .hero{background:linear-gradient(180deg,#2E6F47 0%,#1F4E33 100%);color:#fff;border-radius:22px;padding:24px 28px;display:grid;grid-template-columns:1.4fr 1fr;gap:24px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-120px;top:-80px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(196,132,58,.18),transparent 70%)}
  .hero-eb{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;opacity:.6;font-weight:600}
  .hero-t{font-size:46px;line-height:1.05;margin:8px 0;font-family:var(--font-display);font-style:italic;letter-spacing:-.012em}
  .hero-t .acc{color:var(--accent)}
  .hero-s{color:rgba(255,255,255,.7);font-size:13.5px}
  .hero-r{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:center;position:relative;z-index:1}
  .hero-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 14px}
  .hero-stat .l{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;opacity:.6;font-weight:600}
  .hero-stat .v{font-family:var(--font-display);font-style:italic;font-size:28px;line-height:1;margin-top:4px}
  .hero-stat .s{font-size:11px;opacity:.75;margin-top:3px}
  /* Cards */
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
  .grid > .col-4{grid-column:span 4}.grid > .col-5{grid-column:span 5}.grid > .col-7{grid-column:span 7}
  .grid > .col-6{grid-column:span 6}.grid > .col-8{grid-column:span 8}.grid > .col-12{grid-column:span 12}
  .card{background:#fff;border:1px solid var(--hairline);border-radius:16px;padding:18px 20px}
  .card-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;gap:8px}
  .card-t{font-size:14px;font-weight:600}.card-s{font-size:12px;color:var(--muted)}
  .card-act{font-size:12.5px;color:var(--primary);cursor:pointer;font-weight:500}
  /* KPI */
  .kt{background:#fff;border:1px solid var(--hairline);border-radius:14px;padding:16px 18px}
  .kt-l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .kt-v{font-family:var(--font-display);font-style:italic;font-size:30px;line-height:1.05;margin-top:6px}
  .kt-v .u{font-style:normal;color:var(--muted);font-size:18px;margin-left:4px;font-family:var(--font-ui)}
  .kt-s{font-size:11.5px;color:var(--muted);margin-top:6px}
  .kt-bar{height:5px;border-radius:3px;background:var(--bg-deep);margin-top:10px;overflow:hidden}
  .kt-bar > div{height:100%;background:var(--positive)}
  /* Approval queue */
  .appq{display:flex;flex-direction:column;gap:0}
  .appq-i{display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;padding:14px 4px;border-bottom:1px solid var(--hairline);align-items:center}
  .appq-i:last-child{border-bottom:0}
  .appq-i .av{width:38px;height:38px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;font-weight:600;font-size:13px}
  .appq-i .body .nm{font-size:13.5px;font-weight:600}
  .appq-i .body .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .appq-i .body .meta .lao{margin-left:6px}
  .appq-i .when{font-size:11.5px;color:var(--ink-2);text-align:right}
  .appq-i .actions{display:flex;gap:6px}
  .b-ok{background:var(--positive);color:#fff;border:0;border-radius:8px;padding:7px 11px;font-weight:600;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
  .b-no{background:#fff;color:var(--danger);border:1px solid var(--danger-soft);border-radius:8px;padding:7px 11px;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit}
  .b-ed{background:#fff;color:var(--ink-2);border:1px solid var(--hairline);border-radius:8px;padding:7px 11px;font-weight:500;font-size:12px;cursor:pointer;font-family:inherit}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;background:var(--bg-deep);color:var(--ink-2)}
  .pill.primary{background:var(--primary-soft);color:var(--primary)}
  .pill.positive{background:var(--positive-soft);color:var(--positive)}
  .pill.warning{background:var(--warning-soft);color:var(--warning)}
  .pill.danger{background:var(--danger-soft);color:var(--danger)}
  .pill.accent{background:var(--accent-soft);color:var(--accent)}
  /* Roster */
  .roster{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .rost{display:grid;grid-template-columns:auto 1fr auto;gap:10px;padding:9px 11px;background:var(--paper);border:1px solid var(--hairline);border-radius:10px;align-items:center}
  .rost .av{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;font-weight:600;font-size:11.5px}
  .rost.off .av{background:var(--warning-soft);color:var(--warning)}
  .rost .nm{font-size:12.5px;font-weight:600;line-height:1.2}
  .rost .role{font-size:10.5px;color:var(--muted);margin-top:1px}
  .rost .st{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;text-align:right}
  .rost .st.work{color:var(--positive)}.rost .st.lv{color:var(--warning)}.rost .st.late{color:var(--danger)}
  /* Schedule heatmap */
  .sched{display:grid;grid-template-columns:90px repeat(7,1fr);gap:2px;font-size:11px}
  .sched .h{padding:6px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase}
  .sched .lab{padding:6px 8px;color:var(--ink-2);font-size:11.5px;font-weight:500}
  .sched .c{aspect-ratio:1.4;border-radius:5px;background:#EEF2EE;display:grid;place-items:center;font-size:10.5px;color:var(--muted-2)}
  .sched .c.l1{background:#E2EEDF;color:var(--positive)}
  .sched .c.l2{background:#BCDABE;color:#1F4E33}
  .sched .c.l3{background:#7FB587;color:#fff;font-weight:600}
  .sched .c.off{background:#F6E9C8;color:var(--warning)}
  .sched .c.t{background:#E5E8F2;color:var(--primary)}
  /* Perf bars */
  .perf{display:flex;flex-direction:column;gap:14px}
  .perf-i{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
  .perf-i .av{width:30px;height:30px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;font-weight:600;font-size:11px}
  .perf-i .nm{font-size:12.5px;font-weight:600}
  .perf-i .role{font-size:11px;color:var(--muted);margin-top:1px}
  .perf-i .bars{display:flex;flex-direction:column;gap:5px;min-width:0}
  .perf-i .bar{height:5px;border-radius:3px;background:var(--bg-deep);overflow:hidden;width:280px;max-width:100%}
  .perf-i .bar > div{height:100%;background:var(--primary)}
  .perf-i .score{font-family:var(--font-display);font-style:italic;font-size:22px;line-height:1;text-align:right;min-width:40px}
  /* Alert strip */
  .alerts{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .alert{background:#fff;border:1px solid var(--hairline);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px}
  .al-mk{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:0 0 28px}
  .al-mk.warn{background:var(--warning-soft);color:var(--warning)}
  .al-mk.dang{background:var(--danger-soft);color:var(--danger)}
  .al-mk.pos{background:var(--positive-soft);color:var(--positive)}
  .al-t{font-size:13px;font-weight:600;line-height:1.2}
  .al-s{font-size:11.5px;color:var(--muted);margin-top:2px}
  /* Btn */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid transparent;font-family:inherit}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.ghost{background:#fff;color:var(--ink-2);border-color:var(--hairline)}
  .btn.go{background:var(--positive);color:#fff;border-color:var(--positive)}
  /* Tab filter */
  .seg{display:inline-flex;background:var(--paper);border:1px solid var(--hairline);border-radius:9px;padding:2px;gap:2px}
  .seg button{background:transparent;border:0;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);font-family:inherit}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(20,24,42,.08)}
  .seg button .ct{margin-left:4px;color:var(--muted-2);font-weight:600}
  .seg button.on .ct{color:var(--accent)}
  /* Workflow */
  .wf{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .wf-step{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;background:var(--paper);border:1px solid var(--hairline);font-size:11.5px}
  .wf-step.on{background:var(--positive-soft);border-color:transparent;color:var(--positive)}
  .wf-step .c{width:18px;height:18px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:10px;font-weight:600;color:var(--muted)}
  .wf-step.on .c{background:var(--positive);color:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">

];

                  <div style={{display:"flex",gap:6,fontSize:10.5,color:"var(--muted)"}}><span style={{width:50}}>SAFE</span><div className="bar"><div style={{width:p.saf+"%",background:"var(--accent)"}}/></div><span className="mono">{p.saf}%</span></div>

                <div className="wf-step"><span className="c">P</span>{t("Posted","ບັນທຶກ")}</div>
