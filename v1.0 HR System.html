<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>v1.0 HR System — HRMS Console</title>
<meta name="viewport" content="width=1440, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Noto+Sans+Lao:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #F4EFE5;
    --bg-deep: #ECE4D2;
    --paper: #FBF8F1;
    --surface: #FFFFFF;
    --ink: #14182A;
    --ink-2: #2A2F45;
    --muted: #6B6E7B;
    --muted-2: #8B8E99;
    --hairline: #E5DECC;
    --hairline-strong: #D8CFB8;

    --primary: #1A2A57;        /* deep navy */
    --primary-soft: #E5E8F2;
    --accent: #C4843A;         /* amber */
    --accent-soft: #F4E7CE;
    --positive: #2E6F47;       /* forest */
    --positive-soft: #DDEAD8;
    --warning: #B5832B;
    --warning-soft: #F6E9C8;
    --danger: #A8392E;
    --danger-soft: #F2D7CD;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-xl: 18px;

    --shadow-sm: 0 1px 0 rgba(20,24,42,0.04), 0 1px 2px rgba(20,24,42,0.04);
    --shadow-md: 0 1px 0 rgba(20,24,42,0.04), 0 8px 24px -12px rgba(20,24,42,0.16);

    --font-ui: "Instrument Sans", ui-sans-serif, system-ui, sans-serif;
    --font-display: "Instrument Serif", "Instrument Sans", serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
    --font-lao: "Noto Sans Lao", "Instrument Sans", sans-serif;

    --row-pad: 14px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .lao { font-family: var(--font-lao); letter-spacing: 0.005em; }
  .mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1; }
  .serif { font-family: var(--font-display); font-style: italic; letter-spacing: -0.005em; }

  /* utility classes used heavily */
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }

  ::selection { background: var(--accent-soft); }

  /* density variants */
  body[data-density="compact"] { --row-pad: 10px; font-size: 13px; }
  body[data-density="comfy"] { --row-pad: 18px; font-size: 14.5px; }
</style>

<script type="application/json" id="brand-config">
{ "name": "HRMS", "tenant": "Lao Beverage Co., Ltd." }
</script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/policy-ledger.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/charts.jsx"></script>
  <script type="text/babel" src="src/dashboard.jsx"></script>
  <script type="text/babel" src="src/screens.jsx"></script>
  <script type="text/babel" src="src/cms.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
